name: Project health check

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]


jobs:
  development_check:
    runs-on: ubuntu-latest

    steps:
      - name: Download the code
        uses: actions/checkout@v4

      - name: Download PHP with its extensions
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, bcmath, ctype, fileinfo, json, tokenizer, xml, pdo_mysql, redis
      
      - name: Install composer packages
        run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: Check code style
        run: ./vendor/bin/pint --test

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.22.1'

      - name: Ensure specific npm version
        run: npm install -g npm@11.10.0
      
      - name: Prepare the environment
        run: | 
          cp .env.example .env
          php artisan key:generate
      
      - name: Install node packages
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Prepare the environment
        run: | 
          cp .env.example .env
          php artisan key:generate
      
      - name: Check Database Migrations
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"
        run: php artisan migrate --force

      - name: Execute Tests
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"
        run: php artisan test
  
  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    needs: development_check

    steps:
      - name: Download the code
        uses: actions/checkout@v4

      - name: Download PHP with its extensions
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, bcmath, ctype, fileinfo, json, tokenizer, xml, pdo_mysql, redis
      
      - name: Install composer packages
        run: composer install --no-ansi --no-interaction --no-progress --no-scripts --prefer-dist --no-dev --optimize-autoloader

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.22.1'

      - name: Ensure specific npm version
        run: npm install -g npm@11.10.0

      - name: Prepare the environment
        run: | 
          cp .env.example .env
          php artisan key:generate

      - name: Install node packages
        run: npm ci

      - name: Build assets
        run: npm run build
      
      - name: Clean old assets on the instance
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /var/www/html/task-and-communication
            php artisan down
            git pull origin master
            rm -rf public/build

      - name: Copy built assets to the instance
        uses: appleboy/scp-action@v0.1.4
        with:
         host: ${{ secrets.EC2_HOST }}
         username: ${{ secrets.EC2_USER }}
         key: ${{ secrets.EC2_SSH_KEY }}
         source: "public/build/"
         target: "/var/www/html/task-and-communication/public/build"
         strip_components: 2
      
      - name: Deploy to the instance
        uses: appleboy/ssh-action@v1.0.0
        with:
         host: ${{ secrets.EC2_HOST }}
         username: ${{ secrets.EC2_USER }}
         key: ${{ secrets.EC2_SSH_KEY }}
         script: |
           cd /var/www/html/task-and-communication
           composer install --no-ansi --no-interaction --no-progress --no-scripts --prefer-dist --no-dev --optimize-autoloader
           rm -f bootstrap/cache/config.php bootstrap/cache/services.php bootstrap/cache/routes.php bootstrap/cache/packages.php
           php artisan migrate --force
           php artisan optimize
           php artisan up
